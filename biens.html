<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo Pro - Catalogue</title>
    <link rel="stylesheet" href="alary.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <h1>Nos Biens</h1>
        <p>Trouvez votre futur chez-vous</p>
    </header>

    <main class="feed-container">
        <div class="property-card">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?q=80&w=500" alt="Villa">
                <span class="badge rent">À Louer</span>
                <div class="price-tag">3 000 $ / mois</div>
            </div>
            <div class="card-content">
                <h3>Villa avec piscine - Carrefour</h3>
                <p class="location"><i class="fas fa-map-marker-alt"></i> Lubumbashi, Quartier Carrefour</p>
                <div class="details">
                    <span><i class="fas fa-bed"></i> 4 Chambres</span>
                    <span><i class="fas fa-swimming-pool"></i> Piscine</span>
                </div>
                <a href="https://wa.me/243830434141" class="btn-contact">Contact WhatsApp</a>
            </div>
        </div>

        <div class="property-card">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914?q=80&w=500" alt="Maison">
                <span class="badge sell">À Vendre</span>
                <div class="price-tag">180 000 $</div>
            </div>
            <div class="card-content">
                <h3>Jolie maison au Golf Malela</h3>
                <p class="location"><i class="fas fa-map-marker-alt"></i> Lubumbashi, Golf Malela</p>
                <div class="details">
                    <span><i class="fas fa-bed"></i> 3 Chambres</span>
                    <span><i class="fas fa-road"></i> Sur asphalte</span>
                </div>
                <a href="https://wa.me/243830434141" class="btn-contact">Contact WhatsApp</a>
            </div>
        </div>
    </main>

</body>
</html>
